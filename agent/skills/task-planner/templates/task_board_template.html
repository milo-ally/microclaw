<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{project_name}} - 任务看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .project-title {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
        }
        
        .project-meta {
            display: flex;
            gap: 30px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            text-align: right;
            color: #666;
            font-size: 0.9rem;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .column {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .column-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        
        .todo .column-header { border-color: #FF9800; color: #FF9800; }
        .in-progress .column-header { border-color: #2196F3; color: #2196F3; }
        .review .column-header { border-color: #9C27B0; color: #9C27B0; }
        .done .column-header { border-color: #4CAF50; color: #4CAF50; }
        
        .task-list {
            min-height: 400px;
        }
        
        .task-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: move;
            transition: all 0.2s ease;
            border-left: 4px solid;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .task-card.high { border-left-color: #F44336; }
        .task-card.medium { border-left-color: #FF9800; }
        .task-card.low { border-left-color: #4CAF50; }
        
        .task-id {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .task-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .task-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #666;
        }
        
        .priority {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .priority.high { background: #FFEBEE; color: #F44336; }
        .priority.medium { background: #FFF3E0; color: #FF9800; }
        .priority.low { background: #E8F5E9; color: #4CAF50; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        @media (max-width: 1200px) {
            .board { grid-template-columns: repeat(2, 1fr); }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 768px) {
            .board { grid-template-columns: 1fr; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="project-title">{{project_name}}</h1>
            <div class="project-meta">
                <span>创建时间: {{created_at}}</span>
                <span>最后更新: {{last_updated}}</span>
                <span>负责人: {{project_owner}}</span>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" style="width: {{progress}}%"></div>
            </div>
            <div class="progress-text">
                完成进度: {{completed_tasks}}/{{total_tasks}} ({{progress}}%)
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">{{total_tasks}}</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{completed_tasks}}</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{in_progress_tasks}}</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{blocked_tasks}}</div>
                <div class="stat-label">受阻</div>
            </div>
        </div>
        
        <div class="board">
            <div class="column todo">
                <div class="column-header">待处理</div>
                <div class="task-list" id="todo-list">
                    <!-- 待处理任务将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <div class="column in-progress">
                <div class="column-header">进行中</div>
                <div class="task-list" id="in-progress-list">
                    <!-- 进行中任务将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <div class="column review">
                <div class="column-header">审核中</div>
                <div class="task-list" id="review-list">
                    <!-- 审核中任务将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <div class="column done">
                <div class="column-header">已完成</div>
                <div class="task-list" id="done-list">
                    <!-- 已完成任务将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 示例任务数据
        const tasks = {{tasks_json}};
        
        // 渲染任务到对应列
        function renderTasks() {
            const columns = {
                'todo': document.getElementById('todo-list'),
                'in-progress': document.getElementById('in-progress-list'),
                'review': document.getElementById('review-list'),
                'done': document.getElementById('done-list')
            };
            
            // 清空所有列
            Object.values(columns).forEach(col => col.innerHTML = '');
            
            // 渲染每个任务
            tasks.forEach(task => {
                const taskElement = createTaskElement(task);
                const column = getColumnForStatus(task.status);
                if (column && columns[column]) {
                    columns[column].appendChild(taskElement);
                }
            });
        }
        
        // 根据状态获取对应的列
        function getColumnForStatus(status) {
            switch(status) {
                case 'pending': return 'todo';
                case 'in_progress': return 'in-progress';
                case 'review': return 'review';
                case 'completed': return 'done';
                default: return 'todo';
            }
        }
        
        // 创建任务卡片元素
        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = `task-card ${task.priority}`;
            div.draggable = true;
            div.dataset.taskId = task.id;
            
            div.innerHTML = `
                <div class="task-id">${task.id}</div>
                <div class="task-title">${task.description}</div>
                <div class="task-meta">
                    <span>${task.estimated_time}</span>
                    <span class="priority ${task.priority}">${task.priority}</span>
                </div>
            `;
            
            // 添加拖拽事件
            div.addEventListener('dragstart', handleDragStart);
            
            return div;
        }
        
        // 拖拽功能
        let draggedTask = null;
        
        function handleDragStart(e) {
            draggedTask = e.target;
            e.dataTransfer.effectAllowed = 'move';
        }
        
        // 为所有列添加拖拽事件
        document.querySelectorAll('.task-list').forEach(list => {
            list.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });
            
            list.addEventListener('drop', e => {
                e.preventDefault();
                if (draggedTask) {
                    list.appendChild(draggedTask);
                    updateTaskStatus(draggedTask.dataset.taskId, getStatusFromColumn(list.id));
                }
            });
        });
        
        function getStatusFromColumn(columnId) {
            switch(columnId) {
                case 'todo-list': return 'pending';
                case 'in-progress-list': return 'in_progress';
                case 'review-list': return 'review';
                case 'done-list': return 'completed';
                default: return 'pending';
            }
        }
        
        function updateTaskStatus(taskId, newStatus) {
            // 在实际应用中，这里应该发送请求到服务器更新任务状态
            console.log(`更新任务 ${taskId} 状态为 ${newStatus}`);
        }
        
        // 初始化渲染
        renderTasks();
        
        // 自动刷新（每30秒）
        setInterval(() => {
            // 在实际应用中，这里应该从服务器获取最新数据
            console.log('刷新任务数据...');
        }, 30000);
    </script>
</body>
</html>
